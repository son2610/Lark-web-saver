<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lark Web Saver</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="logo-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M5 5a2 2 0 0 1 2-2h6l6 6v10a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V5z" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M13 3v6h6" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M9 13h6M9 17h4" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <defs>
              <linearGradient id="grad1" x1="5" y1="3" x2="19" y2="21">
                <stop offset="0%" stop-color="#3370FF"/>
                <stop offset="100%" stop-color="#7B61FF"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1 class="header-title">Lark Web Saver</h1>
      </div>
      <button id="btn-settings" class="btn-icon" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>

    <!-- Status indicator -->
    <div id="status-bar" class="status-bar hidden">
      <span id="status-icon" class="status-icon"></span>
      <span id="status-text" class="status-text"></span>
    </div>

    <!-- Form -->
    <div class="form">
      <!-- Title -->
      <div class="field">
        <label class="field-label" for="field-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V4h16v3M9 20h6M12 4v16"/></svg>
          Title
        </label>
        <input type="text" id="field-title" class="field-input" placeholder="Page title..." readonly>
      </div>

      <!-- URL -->
      <div class="field">
        <label class="field-label" for="field-url">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          URL
        </label>
        <input type="text" id="field-url" class="field-input" placeholder="Page URL..." readonly>
      </div>

      <!-- Description -->
      <div class="field">
        <label class="field-label" for="field-description">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          Description
        </label>
        <textarea id="field-description" class="field-textarea" placeholder="Page description..." rows="2"></textarea>
      </div>

      <!-- Tags -->
      <div class="field">
        <label class="field-label" for="field-tags">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
          Tags
        </label>
        <select id="field-tags" class="field-select">
          <option value="">-- Select tag --</option>
          <!-- Options loaded dynamically from settings -->
        </select>
      </div>

      <!-- Notes -->
      <div class="field">
        <label class="field-label" for="field-notes">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Notes
        </label>
        <textarea id="field-notes" class="field-textarea" placeholder="Your personal notes..." rows="2"></textarea>
      </div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button id="btn-save-base" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></svg>
        Save to Base
      </button>
    </div>

    <!-- Group Selection for Bot -->
    <div class="group-selector">
      <div class="group-selector-header">
        <label class="field-label">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9 22,2"/></svg>
          Send to Groups
        </label>
        <label class="group-check-all">
          <input type="checkbox" id="check-all-groups"> <span>Select All</span>
        </label>
      </div>
      <div id="group-checkboxes" class="group-checkboxes">
        <!-- Populated by JS -->
        <span class="group-empty-hint">No groups configured. Add webhooks in Settings.</span>
      </div>
      <button id="btn-send-bot" class="btn btn-secondary" style="width:100%; margin-top: 8px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9 22,2"/></svg>
        Send to Selected Groups
      </button>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <span>Lark Web Saver v1.0</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
